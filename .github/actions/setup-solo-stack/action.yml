name: Setup Solo stack (Kind + Falcon one-shot)
description: Deploys a local Hiero network using Solo Falcon one-shot on Kind.

inputs:
  network-tag:
    description: Consensus / network node container image tag (--release-tag)
    required: false
    default: "v0.72.0"
  mirror-tag:
    description: Mirror node chart/image version (--mirror-node-version)
    required: false
    default: "v0.154.0"
  solo-version:
    description: npm package version for @hashgraph/solo
    required: false
    default: "0.71.0"
  relay-tag:
    description: JSON-RPC relay image/chart tag (--relay-release)
    required: false
    default: "0.76.2"

runs:
  using: composite
  steps:
    - name: Generate falcon-values config file
      shell: bash
      run: |
        cat > .github/falcon.yml <<EOF
        network:
          --release-tag: "${{ inputs.network-tag }}"
          --node-aliases: "node1"
        setup:
          --release-tag: "${{ inputs.network-tag }}"
          --node-aliases: "node1"
        consensusNode:
          --node-aliases: "node1"
        mirrorNode:
          --enable-ingress: true
          --pinger: true
          --mirror-node-version: "${{ inputs.mirror-tag }}"
          --values-file: .github/mirror-node-values.yaml
        relayNode:
          --relay-release: "${{ inputs.relay-tag }}"
          --node-aliases: "node1"
        EOF

    - name: Setup Kind
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      with:
        install_only: true
        node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
        version: v0.29.0
        kubectl_version: v1.32.5
        verbosity: 3
        wait: 120s

    - name: Start the Solo node
      id: solo-deploy
      shell: bash
      run: |
        npx @hashgraph/solo@${{ inputs.solo-version }} one-shot falcon deploy \
          --values-file .github/falcon.yml \
          --dev \
          --deploy-explorer=false \
          --external-address 0.0.0.0

    # Temporary: dump relay/kubectl state after every Solo deploy attempt (success or failure).
    # Remove this step before merging once relay CI is stable.
    - name: Debug relay after Solo deploy (temporary)
      if: ${{ always() && steps.solo-deploy.outcome != 'skipped' }}
      shell: bash
      run: |
        set +e
        export PATH="${HOME}/.solo/bin:${PATH}"

        echo "::group::kubectl context"
        kubectl version --client 2>/dev/null || true
        kubectl config get-contexts 2>/dev/null || true
        if kubectl config get-contexts -o name 2>/dev/null | grep -qx 'kind-solo-cluster'; then
          kubectl config use-context kind-solo-cluster
        fi
        echo "::endgroup::"

        echo "::group::Pods matching relay labels (app.kubernetes.io/name=relay)"
        kubectl get pods -A -l app.kubernetes.io/name=relay -o wide 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::Pods matching relay instance (app.kubernetes.io/instance=relay-1)"
        kubectl get pods -A -l app.kubernetes.io/instance=relay-1 -o wide 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::All pods (grep relay)"
        kubectl get pods -A -o wide 2>/dev/null | grep -E '^NAMESPACE|relay' || kubectl get pods -A -o wide 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::Describe relay-labeled pods"
        while read -r line; do
          [[ -z "$line" ]] && continue
          ns=$(echo "$line" | awk '{print $1}')
          pod=$(echo "$line" | awk '{print $2}')
          echo "---- describe $ns/$pod ----"
          kubectl describe pod -n "$ns" "$pod" 2>/dev/null || true
        done < <(kubectl get pods -A -l app.kubernetes.io/name=relay --no-headers 2>/dev/null)
        echo "::endgroup::"

        echo "::group::Relay pod logs (all containers, tail 400)"
        while read -r line; do
          [[ -z "$line" ]] && continue
          ns=$(echo "$line" | awk '{print $1}')
          pod=$(echo "$line" | awk '{print $2}')
          echo "---- logs $ns/$pod ----"
          kubectl logs -n "$ns" "$pod" --all-containers --tail=400 --timestamps 2>&1 || true
        done < <(kubectl get pods -A -l app.kubernetes.io/name=relay --no-headers 2>/dev/null)

        # Fallback: any pod with "relay" in the name if labels differ from Solo's expectation
        if ! kubectl get pods -A -l app.kubernetes.io/name=relay --no-headers 2>/dev/null | grep -q .; then
          while read -r podpath; do
            [[ -z "$podpath" ]] && continue
            ns=${podpath#pod/}
            ns=${ns%%/*}
            pod=${podpath##*/}
            echo "---- logs (name match) $ns/$pod ----"
            kubectl logs -n "$ns" "$pod" --all-containers --tail=400 --timestamps 2>&1 || true
          done < <(kubectl get pods -A -o name 2>/dev/null | grep -i relay)
        fi
        echo "::endgroup::"

        echo "::group::Recent events (namespaces containing rss or solo)"
        for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep -E 'rss-|solo'); do
          echo "---- events in $ns ----"
          kubectl get events -n "$ns" --sort-by='.lastTimestamp' 2>/dev/null | tail -60 || true
        done
        echo "::endgroup::"

        echo "::group::Helm releases (if helm available)"
        command -v helm >/dev/null && helm list -A 2>/dev/null || echo "helm not on PATH"
        echo "::endgroup::"
