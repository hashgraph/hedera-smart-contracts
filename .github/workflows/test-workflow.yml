name: Reusable test workflow

on:
  workflow_call:
    inputs:
      testfilter:
        required: true
        type: string
      networkTag:
        required: false
        type: string
      mirrorTag:
        required: false
        type: string
      relayTag:
        required: false
        type: string
      soloVersion:
        required: false
        type: string

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  acceptance-workflow:
    runs-on: smart-contracts-linux-large
    timeout-minutes: 35
    strategy:
      fail-fast: false

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Use Node.js [24]
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          #cache: npm Disabling this because it causes the workflow to hang and eventually timeout

      - name: Create .env file
        run: cp local.env .env

      - name: Install dependencies
        run: npm ci

      # This step is required to avoid "HardhatFoundryError: Couldn't run `forge`"
      - name: Install Foundry
        uses: step-security/foundry-toolchain@ced99da5c56c695ce707ab2715ca678d6e8a7038 # v1.4.0
        with:
          version: stable

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Deploy local Hiero network (Solo / Kind)
        id: solo_stack
        run: bash .github/scripts/setup-solo-stack.sh
        env:
          NETWORK_TAG: ${{ inputs.networkTag || 'v0.72.0' }}
          MIRROR_TAG: ${{ inputs.mirrorTag || 'v0.151.0' }}
          RELAY_TAG: ${{ inputs.relayTag || '0.76.2' }}
          SOLO_VERSION: ${{ inputs.soloVersion || '0.72.0' }}
        timeout-minutes: 15

      - name: Solo kubectl port forwards (50211 / 8545)
        run: bash .github/workflows/support/scripts/solo-kubectl-port-forward.sh
        env:
          SOLO_NAMESPACE: ${{ steps.solo_stack.outputs.namespace }}

      - name: Run the test in ${{ inputs.testfilter }}
        run: npx hardhat test --grep ${{ inputs.testfilter }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Test Results (${{ inputs.testfilter }})
          path: test-*.xml

      - name: Publish Test Report
        uses: step-security/publish-unit-test-result-action@43e0c963eea0ace6eca353cb1d814d857fee5c53 # v2.20.2
        if: ${{ !cancelled() }}
        with:
          check_name: 'Unit Tests results' # Set to empty to disable check run
          comment_mode: errors
          json_thousands_separator: ','
          files: 'test-*.xml'

      - name: One-shot Falcon destroy
        if: always()
        run: |
          npx @hashgraph/solo@${{ inputs.soloVersion || '0.72.0' }} one-shot falcon destroy \
            --deployment "${{ steps.solo_stack.outputs.deployment_name }}" \
            --dev \
            --quiet-mode || true

      - name: Upload Solo logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: solo-logs (${{ inputs.testfilter }})
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn

